services:
  db:
    image: pgvector/pgvector:pg16
    container_name: knowledge_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_assistant
      POSTGRES_USER: knowledge_user
      POSTGRES_PASSWORD: knowledge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U knowledge_user -d knowledge_assistant"
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: